<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>uncoverd — email signature (Customer Service)</title></head>
<body style="margin:0;padding:24px;background:#f4f5f7;">

<!-- ============================================================
  uncoverd email signature — Customer Service · Berlin, Germany
  How to install (Gmail):
    1. Open this file in a browser.
    2. Drag-select from "uncoverd Customer Service" down through the
       banner, then Ctrl+C.
    3. Gmail → Settings → See all settings → General → Signature →
       Create new → paste (Ctrl+V) → Save changes.
  No images = renders everywhere, never blocked as remote content.
  Banner: navy gradient (top #111d3a → bottom #070b13) with a solid
  fallback for clients that strip background-image.
============================================================= -->

<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;max-width:460px;">
  <!-- name + title -->
  <tr>
    <td style="padding:0 0 2px 0;">
      <span style="font-size:16px;font-weight:bold;color:#111827;letter-spacing:-0.2px;">uncoverd Customer Service</span>
    </td>
  </tr>
  <tr>
    <td style="padding:0 0 10px 0;">
      <span style="font-size:12.5px;color:#6b7280;"><span style="color:#15b87f;font-weight:bold;">uncoverd</span>&nbsp;&middot;&nbsp;Berlin, Germany</span>
    </td>
  </tr>
  <!-- contact line -->
  <tr>
    <td style="padding:0 0 12px 0;font-size:12.5px;color:#6b7280;">
      <a href="https://uncoverd.org" style="color:#2563eb;text-decoration:none;">uncoverd.org</a>
      &nbsp;&middot;&nbsp;
      <a href="https://uncoverd.org/pricing" style="color:#2563eb;text-decoration:none;">See plans</a>
    </td>
  </tr>
  <!-- banner -->
  <tr>
    <td>
      <a href="https://uncoverd.org" style="text-decoration:none;display:block;">
        <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#0d1730;background-image:linear-gradient(180deg,#111d3a 0%,#070b13 100%);border-radius:12px;">
          <tr>
            <td style="padding:14px 18px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <!-- green brand dot -->
                  <td valign="middle" style="padding-right:9px;">
                    <span style="display:inline-block;width:10px;height:10px;border-radius:10px;background-color:#2fe3a0;font-size:0;line-height:0;">&nbsp;</span>
                  </td>
                  <td valign="middle">
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:bold;color:#ffffff;letter-spacing:-0.3px;">uncoverd</span>
                  </td>
                </tr>
              </table>
              <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#94a3b8;padding-top:6px;line-height:1.45;">
                Every edge in dividend investing &mdash; A&ndash;F ratings on every dividend stock, payout calendar, screener &amp; portfolio tools.
              </div>
              <div style="padding-top:9px;">
                <span style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:bold;color:#2fe3a0;">uncoverd.org &rarr;</span>
              </div>
            </td>
          </tr>
        </table>
      </a>
    </td>
  </tr>
</table>
