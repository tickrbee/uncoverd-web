<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to uncoverd...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting to uncoverd...</h1>
        <p>Please wait...</p>
    </div>

    <script>
        (function() {
            console.log('🔗 Callback page loaded');
            console.log('📍 Current URL:', window.location.href);
            console.log('🔍 Search params:', window.location.search);
            console.log('🔍 Hash:', window.location.hash);
            
            // Get all URL parameters (both query string and hash)
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            console.log('📋 Query params:', Array.from(urlParams.entries()));
            console.log('📋 Hash params:', Array.from(hashParams.entries()));
            
            // Combine all parameters
            const params = new URLSearchParams();
            
            // Add query params
            for (const [key, value] of urlParams.entries()) {
                params.append(key, value);
                console.log(`➕ Added query param: ${key} = ${value.substring(0, 20)}...`);
            }
            
            // Add hash params (these take precedence)
            for (const [key, value] of hashParams.entries()) {
                params.set(key, value);
                console.log(`➕ Added hash param: ${key} = ${value.substring(0, 20)}...`);
            }
            
            // Build the deep link URL
            const deepLinkUrl = 'swipefolio://auth/callback?' + params.toString();
            console.log('🔗 Deep link URL:', deepLinkUrl.substring(0, 100) + '...');
            
            // Try to redirect to deep link immediately
            try {
                window.location.href = deepLinkUrl;
                console.log('✅ Redirected to deep link');
            } catch (e) {
                console.error('❌ Failed to redirect:', e);
            }
            
            // Fallback: if deep link doesn't work, try to open the app store or show message
            setTimeout(function() {
                // If we're still here after 2 seconds, the deep link didn't work
                console.warn('⚠️ Still on page after 2 seconds, deep link may not have worked');
                const message = document.querySelector('p');
                if (message) {
                    message.textContent = 'If the app doesn\'t open automatically, please return to the uncoverd app manually.';
                }
                
                // Try alternative methods
                // On Android, try intent:// URL
                if (/Android/i.test(navigator.userAgent)) {
                    console.log('🤖 Trying Android intent URL...');
                    const intentUrl = 'intent://auth/callback?' + params.toString() + '#Intent;scheme=swipefolio;package=com.swipefolio.app;end';
                    try {
                        window.location.href = intentUrl;
                    } catch (e) {
                        console.error('❌ Failed to redirect with intent:', e);
                    }
                }
            }, 2000);
        })();
    </script>
</body>
</html>
