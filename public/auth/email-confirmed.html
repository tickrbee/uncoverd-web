<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - uncoverd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background-color: #34D399;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }
        
        .success-icon svg {
            width: 50px;
            height: 50px;
            stroke: #000000;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #a1a1aa;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .message {
            font-size: 16px;
            color: #d4d4d8;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            padding: 14px 32px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            margin-top: 20px;
        }
        
        .button:hover {
            background-color: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #71717a;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        
        <h1>Email Confirmed!</h1>
        <p class="subtitle">Your email address has been successfully verified</p>
        <p class="message">
            You're all set! Your uncoverd account is now active. You can start exploring and building your portfolio.
        </p>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #a1a1aa; font-size: 14px;">Redirecting to app...</p>
        </div>
        
        <a href="/" class="button" id="continueBtn">Continue to uncoverd</a>
        
        <div class="footer">
            <p>— The uncoverd team</p>
        </div>
    </div>

    <script>
        (function() {
            console.log('✅ Email confirmation success page loaded');
            
            // Check if we're in a mobile app context
            const isMobileApp = window.location.protocol === 'swipefolio:' || 
                               window.navigator.userAgent.includes('Swipefolio');
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            // Check for Supabase auth tokens/params
            const hasAuthParams = urlParams.has('access_token') || 
                                 urlParams.has('type') ||
                                 hashParams.has('access_token');
            
            if (hasAuthParams) {
                console.log('🔐 Auth parameters detected, processing...');
                const loading = document.getElementById('loading');
                const continueBtn = document.getElementById('continueBtn');
                
                if (loading) loading.classList.add('active');
                if (continueBtn) continueBtn.style.display = 'none';
                
                // If we have auth params, try to redirect to the app
                if (isMobileApp) {
                    // Already in app, just redirect to home
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    // On web, redirect to home page which will handle auth
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                }
            } else {
                // No auth params, just show success message
                console.log('✅ Email confirmed (no redirect needed)');
            }
        })();
    </script>
</body>
</html>
