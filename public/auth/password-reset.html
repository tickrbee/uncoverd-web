<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - uncoverd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        p {
            color: #a1a1aa;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>Taking you to the password reset page...</p>
    </div>

    <script>
        (function() {
            console.log('🔐 Password reset redirect page loaded');
            
            // Preserve the hash (contains the access_token from Supabase)
            const hash = window.location.hash;
            const search = window.location.search;
            
            // Redirect to main app with hash preserved
            // The main app will detect the recovery token and show the password reset form
            const redirectUrl = '/' + (search ? search : '') + (hash ? hash : '');
            
            console.log('🔗 Redirecting to:', redirectUrl);
            
            // Small delay to show the loading message, then redirect
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);
        })();
    </script>
</body>
</html>
